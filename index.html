<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Flags Starter</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:80px;
}

button{
    font-size:32px;
    padding:20px 50px;
}

button:disabled{
    opacity:0.7;
}

#status{
    margin-top:40px;
    font-size:32px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>Beach Flags Starter</h1>

<button id="startButton" onclick="startSequence()">
開始
</button>

<div id="status">
準備完了
</div>

<script>

function wait(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
}

function playAudio(file){

    return new Promise((resolve,reject)=>{

        const audio = new Audio(file);

        audio.onended = () => resolve();

        audio.onerror = () => {
            console.error("音声ファイルが見つかりません:", file);
            reject();
        };

        audio.play()
            .catch(err=>{
                console.error(err);
                reject();
            });
    });
}

async function startSequence(){

    const button =
        document.getElementById("startButton");

    const status =
        document.getElementById("status");

    button.disabled = true;
    button.innerText = "待機中...";

    status.innerText = "10秒後に開始";

    await wait(10000);

    status.innerText = "Competitors Ready";

    try{
        await playAudio("competitors_ready.m4a");
    }catch(e){
        console.log(e);
    }

    await wait(500);

    status.innerText = "Heads Down";

    try{
        await playAudio("heads_down.m4a");
    }catch(e){
        console.log(e);
    }

    const randomDelay =
        Math.random() * 2000 + 2000;

    status.innerText =
        `待機時間 ${(randomDelay/1000).toFixed(1)} 秒`;

    await wait(randomDelay);

    status.innerText = "GO!";

    try{
        await playAudio("whistle.m4a");
    }catch(e){
        console.log(e);
    }

    await wait(500);

    status.innerText = "準備完了";

    button.disabled = false;
    button.innerText = "開始";
}

</script>

</body>
</html>
