<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Flags Starter</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:80px;
}

button{
    font-size:32px;
    padding:20px 50px;
}

button:disabled{
    opacity:0.7;
}

#status{
    margin-top:40px;
    font-size:32px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>Beach Flags Starter</h1>

<button id="startButton" onclick="startSequence()">
開始
</button>

<div id="status">
準備完了
</div>

<script>

function wait(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
}

function playAudio(file){

    return new Promise(resolve => {

        const audio = new Audio(file);

        audio.preload = "auto";
        audio.volume = 1.0;

        audio.onended = () => resolve();

        audio.onerror = () => {
            console.log(file + " が再生できません");
            resolve();
        };

        audio.play().catch(err=>{
            console.log(err);
            resolve();
        });

    });
}

async function startSequence(){

    const button = document.getElementById("startButton");
    const status = document.getElementById("status");

    button.disabled = true;
    button.innerText = "待機中...";

    status.innerText = "10秒後に開始";

    await wait(10000);

    status.innerText = "Competitors Ready";

    await playAudio("competitors_ready.mp3");

    await wait(300);

    status.innerText = "Heads Down";

    await playAudio("heads_down.mp3");

    const randomDelay = Math.random()*2000+2000;

    status.innerText =
        `待機時間 ${(randomDelay/1000).toFixed(1)} 秒`;

    await wait(randomDelay);

    status.innerText = "GO!";

    await playAudio("whistle.mp3");

    await wait(500);

    status.innerText = "準備完了";

    button.disabled = false;
    button.innerText = "開始";

}

</script>

</body>
</html>
